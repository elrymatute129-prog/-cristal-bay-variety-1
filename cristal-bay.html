<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cristal Bay Variety">
    <title>Cristal Bay Variety</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(180deg, #fafbfc 0%, #f0f4f8 100%);
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 20px;
            padding-top: 55px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .brand-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #e8d5b7 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(232,213,183,0.3);
        }

        .brand-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.8;
            color: #c9b8a0;
        }

        .decorative-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e8d5b7, transparent);
            margin: 10px 0;
        }

        .stats-scroll {
            display: flex;
            gap: 12px;
            padding: 20px 15px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .stats-scroll::-webkit-scrollbar { display: none; }

        .stat-card {
            background: white;
            min-width: 100px;
            padding: 18px 12px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .stat-card.total {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: white;
            border: none;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            font-family: 'Playfair Display', serif;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .filters {
            display: flex;
            gap: 8px;
            padding: 0 15px 20px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: white;
            border: 1px solid #e5e9ef;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: #5a6c7d;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #1a1a2e;
            color: #e8d5b7;
            border-color: #1a1a2e;
        }

        .orders-list {
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            animation: slideUp 0.4s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-header {
            padding: 16px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .store-icon {
            font-size: 22px;
        }

        .store-name {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        .order-date {
            font-size: 12px;
            opacity: 0.9;
            font-weight: 400;
        }

        .order-body {
            padding: 20px;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .order-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .price {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #0f3460;
        }

        .status-badge {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tracking-number {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            color: #5a6c7d;
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            border: 1px dashed #d0d8e0;
        }

        .order-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-status {
            background: #f1f5f9;
            color: #1a1a2e;
        }

        .btn-status:active {
            background: #e2e8f0;
        }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
            flex: 0.35;
        }

        .btn-delete:active {
            background: #fee2e2;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }

        .empty-icon {
            font-size: 70px;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 10px;
        }

        .empty-text {
            font-size: 15px;
            color: #94a3b8;
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: #e8d5b7;
            border: none;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(26,26,46,0.4);
            z-index: 1000;
            transition: transform 0.2s;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-height: 92vh;
            margin-top: auto;
            border-radius: 28px 28px 0 0;
            padding: 28px;
            padding-bottom: 50px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #f1f5f9;
            border: none;
            font-size: 24px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 17px;
            transition: all 0.2s;
            -webkit-appearance: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #1a1a2e;
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .store-option {
            position: relative;
        }

        .store-option input {
            position: absolute;
            opacity: 0;
        }

        .store-card {
            padding: 16px 8px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            text-align: center;
            transition: all 0.2s;
            background: white;
        }

        .store-option input:checked + .store-card {
            border-color: #1a1a2e;
            background: #f8fafc;
            transform: scale(1.02);
        }

        .store-emoji {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .store-label {
            font-size: 11px;
            font-weight: 600;
            color: #475569;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .status-option {
            position: relative;
        }

        .status-option input {
            position: absolute;
            opacity: 0;
        }

        .status-card {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            color: #64748b;
        }

        .status-option input:checked + .status-card {
            border-color: #1a1a2e;
            background: #1a1a2e;
            color: #e8d5b7;
        }

        .btn-save {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            color: #e8d5b7;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
        }

        .bg-ebay { background: linear-gradient(135deg, #b91c1c 0%, #1e40af 100%); }
        .bg-alibaba { background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%); }
        .bg-aliexpress { background: linear-gradient(135deg, #dc2626 0%, #ea580c 100%); }
        .bg-amazon { background: linear-gradient(135deg, #f59e0b 0%, #1d4ed8 100%); }
        .bg-temu { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .bg-shein { background: linear-gradient(135deg, #18181b 0%, #3f3f46 100%); }
        .bg-sephora { background: linear-gradient(135deg, #9f1239 0%, #18181b 100%); }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-shipped { background: #e0e7ff; color: #3730a3; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="brand-name">Cristal Bay Variety</div>
                <div class="decorative-line"></div>
                <div class="brand-subtitle">Order Management</div>
            </div>
        </div>

        <div class="stats-scroll">
            <div class="stat-card total">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="deliveredCount">0</div>
                <div class="stat-label">Delivered</div>
            </div>
            <div class="stat-card total">
                <div class="stat-number" id="totalMoney">$0</div>
                <div class="stat-label">Spent</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterOrders('all')">All</button>
            <button class="filter-btn" onclick="filterOrders('eBay')">🛒 eBay</button>
            <button class="filter-btn" onclick="filterOrders('Alibaba')">🏭 Alibaba</button>
            <button class="filter-btn" onclick="filterOrders('AliExpress')">📦 AliExpress</button>
            <button class="filter-btn" onclick="filterOrders('Amazon')">📪 Amazon</button>
            <button class="filter-btn" onclick="filterOrders('Temu')">🛍️ Temu</button>
            <button class="filter-btn" onclick="filterOrders('Shein')">👗 Shein</button>
            <button class="filter-btn" onclick="filterOrders('Sephora')">💄 Sephora</button>
        </div>

        <div id="ordersList" class="orders-list">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-title">No Orders Yet</div>
                <p class="empty-text">Tap + to add your first order</p>
            </div>
        </div>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">New Order</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="form-group">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-input" id="productInput" placeholder="What did you purchase?">
            </div>

            <div class="form-group">
                <label class="form-label">Price ($)</label>
                <input type="number" class="form-input" id="priceInput" placeholder="0.00" step="0.01">
            </div>

            <div class="form-group">
                <label class="form-label">Select Store</label>
                <div class="store-grid">
                    <label class="store-option">
                        <input type="radio" name="store" value="eBay" checked>
                        <div class="store-card">
                            <div class="store-emoji">🛒</div>
                            <div class="store-label">eBay</div>
                        </div>
                    </label>
                    <label class="store-option">
                        <input type="radio" name="store" value="Alibaba">
                        <div class="store-card">
                            <div class="store-emoji">🏭</div>
                            <div class="store-label">Alibaba</div>
                        </div>
                    </label>
                    <label class="store-option">
                        <input type="radio" name="store" value="AliExpress">
                        <div class="store-card">
                            <div class="store-emoji">📦</div>
                            <div class="store-label">AliExpress</div>
                        </div>
                    </label>
                    <label class="store-option">
                        <input type="radio" name="store" value="Amazon">
                        <div class="store-card">
                            <div class="store-emoji">📪</div>
                            <div class="store-label">Amazon</div>
                        </div>
                    </label>
                    <label class="store-option">
                        <input type="radio" name="store" value="Temu">
                        <div class="store-card">
                            <div class="store-emoji">🛍️</div>
                            <div class="store-label">Temu</div>
                        </div>
                    </label>
                    <label class="store-option">
                        <input type="radio" name="store" value="Shein">
                        <div class="store-card">
                            <div class="store-emoji">👗</div>
                            <div class="store-label">Shein</div>
                        </div>
                    </label>
                    <label class="store-option" style="grid-column: 2">
                        <input type="radio" name="store" value="Sephora">
                        <div class="store-card">
                            <div class="store-emoji">💄</div>
                            <div class="store-label">Sephora</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Order Status</label>
